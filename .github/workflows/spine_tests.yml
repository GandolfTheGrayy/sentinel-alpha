name: Spine Tests

on:
  push:
    branches: [main]
    paths:
      - 'sentinel/**'
      - 'scripts/**'
      - '.github/workflows/spine_tests.yml'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pytest anthropic google-generativeai yfinance pandas numpy requests beautifulsoup4 pyyaml

      - run: pytest sentinel/tests/test_spine.py -v
