name: Sentinel Daily Pipeline

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        run: pip install anthropic google-generativeai yfinance pandas numpy requests beautifulsoup4 pyyaml

      - name: Configure git identity
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m sentinel.pipeline

      - name: Commit and push artifacts
        run: |
          git add backtest_results/ docs/data.json docs/history.json
          git diff --cached --quiet || git commit -m "chore(pipeline): post-mortem $(date -u +%F)"
          git push
