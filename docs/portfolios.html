<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#0a0e14">
<title>Portfolios · Sentinel Sentiment Engine</title>
<style>
:root{--bg:#0a0e14;--fg:#c9d1d9;--dim:#6e7681;--line:#21262d;--panel:#10151c;--accent:#39d353;--scout:#58a6ff;--linguist:#f778ba;--historian:#d29922;--judge:#a371f7;--red:#f85149;--green:#3fb950;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--fg);font:14px/1.5 ui-monospace,'SF Mono',Menlo,monospace;padding:32px 24px;max-width:1200px;margin:0 auto;}
h1{font-size:22px;margin-bottom:4px;letter-spacing:-.5px;}
.sub{color:var(--dim);font-size:12px;margin-bottom:24px;}
.sub a{color:var(--accent);text-decoration:none;}
section{margin-bottom:32px;}
h2{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:12px;}
.card{background:var(--panel);border:1px solid var(--line);padding:16px;border-radius:8px;}
.card-title{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.big{font-size:32px;font-weight:700;line-height:1;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.empty{color:var(--dim);font-style:italic;padding:12px 0;font-size:12px;}
.pos{color:var(--green);}.neg{color:var(--red);}
.portfolio-header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.portfolio-header .big{font-size:24px;}
.portfolio-header .ret{font-size:13px;font-weight:600;}
.trade-form{display:grid;grid-template-columns:1.2fr 0.7fr 0.7fr 0.7fr;gap:6px;margin-top:6px;}
.trade-form input,.trade-form select{background:var(--bg);border:1px solid var(--line);color:var(--fg);padding:7px 9px;border-radius:4px;font:inherit;font-size:12px;}
.trade-form button{background:var(--accent);color:#000;border:none;padding:7px 9px;border-radius:4px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.pos-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px;}
.pos-table th{text-align:left;color:var(--dim);font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.5px;padding:4px 6px;border-bottom:1px solid var(--line);}
.pos-table td{padding:6px;border-bottom:1px solid var(--line);}
.pos-table tr:last-child td{border-bottom:none;}
.trade-msg{font-size:11px;margin-top:4px;min-height:14px;}
.trade-msg.ok{color:var(--green);}
.trade-msg.err{color:var(--red);}
.create-form{display:grid;grid-template-columns:1fr 1.5fr 1fr 0.6fr;gap:8px;}
.create-form input{background:var(--bg);border:1px solid var(--line);color:var(--fg);padding:10px 12px;border-radius:4px;font:inherit;font-size:13px;}
.create-form button{background:var(--judge);color:#fff;border:none;padding:10px 16px;border-radius:4px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.summary-row{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin:8px 0;}
@media(max-width:760px){.grid-2{grid-template-columns:1fr;}.create-form{grid-template-columns:1fr;}}
</style>
</head>
<body>
<h1>Portfolios</h1>
<div class="sub">mock $1,000+ portfolios · agent vs you vs whatever you want to test · <a href="/">← main dashboard</a></div>

<section>
<h2>Create a New Portfolio</h2>
<div class="card">
  <form id="create-form" class="create-form">
    <input name="id" placeholder="id (lowercase, e.g. swing_v1)" pattern="[a-z0-9_]{2,24}" required/>
    <input name="name" placeholder="Display name (optional)"/>
    <input name="starting_cash" type="number" min="50" step="50" value="1000" required/>
    <button type="submit">Create</button>
  </form>
  <div id="create-msg" class="trade-msg"></div>
</div>
</section>

<section>
<h2>All Portfolios</h2>
<div id="portfolios-list"></div>
</section>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmt=v=>v==null?'—':`$${(+v).toFixed(2)}`;

async function fetchAndRender(){
  const list=$('portfolios-list');list.innerHTML='<div class="empty">loading…</div>';
  try{
    const r=await fetch('/api/portfolios',{cache:'no-store'}).then(r=>r.json());
    if(r.error)throw new Error(r.error);
    if(!r.portfolios?.length){list.innerHTML='<div class="empty">no portfolios — create one above</div>';return;}
    list.innerHTML='';
    for(const p of r.portfolios){
      const accent=p.id==='agent'?'judge':p.id==='human'?'linguist':'scout';
      const ret=p.total_return_pct;
      const retCls=ret>=0?'pos':'neg';
      const card=document.createElement('div');card.className='card';card.style.marginBottom='12px';card.style.borderLeft=`3px solid var(--${accent})`;
      card.innerHTML=`
        <div class="portfolio-header">
          <div><div class="card-title">${esc((p.name||p.id).toUpperCase())} <span style="color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0;">· ${esc(p.id)}</span></div><div class="big" id="v-${p.id}">${fmt(p.total_value)}</div></div>
          <div class="ret ${retCls}">${ret>=0?'+':''}${ret.toFixed(2)}%</div>
        </div>
        <div class="summary-row"><span>cash: <span id="c-${p.id}">${fmt(p.cash)}</span></span><span>positions: <span id="pv-${p.id}">${fmt(p.positions_value)}</span></span><span>open: ${p.open_count}</span><span>start: ${fmt(p.starting_cash)}</span></div>
        ${p.description?`<div style="font-size:11px;color:var(--dim);margin-bottom:8px;">${esc(p.description)}</div>`:''}
        <div class="card-title" style="margin-top:12px;">Open Positions</div>
        <div id="pos-${p.id}"><div class="empty">loading…</div></div>
        <div class="card-title" style="margin-top:12px;">Place Trade</div>
        <form class="trade-form" data-pid="${esc(p.id)}">
          <input name="ticker" placeholder="TICKER" autocomplete="off" required/>
          <select name="action"><option value="buy">Buy</option><option value="sell">Sell</option></select>
          <input name="shares" type="number" step="0.0001" min="0.0001" placeholder="Shares" required/>
          <button type="submit">Submit</button>
        </form>
        <div class="trade-msg" id="m-${p.id}"></div>
        <div class="card-title" style="margin-top:12px;">Recent Trades</div>
        <div id="t-${p.id}"><div class="empty">loading…</div></div>
      `;
      list.appendChild(card);
      loadDetails(p.id);
    }
    document.querySelectorAll('.trade-form').forEach(f=>f.addEventListener('submit',e=>{e.preventDefault();submitTrade(f);}));
  }catch(e){list.innerHTML=`<div class="empty" style="color:var(--red);">error: ${esc(e.message)}</div>`;}
}

async function loadDetails(id){
  try{
    const d=await fetch(`/api/portfolio?id=${encodeURIComponent(id)}`,{cache:'no-store'}).then(r=>r.json());
    if(d.error)throw new Error(d.error);
    $(`v-${id}`).textContent=fmt(d.total_value);
    $(`c-${id}`).textContent=fmt(d.cash);
    $(`pv-${id}`).textContent=fmt(d.positions_value);
    const posEl=$(`pos-${id}`);
    if(!d.open_positions?.length){posEl.innerHTML='<div class="empty">none</div>';}
    else{
      let h='<table class="pos-table"><thead><tr><th>Ticker</th><th>Shares</th><th>Entry</th><th>Now</th><th>P&amp;L</th><th></th></tr></thead><tbody>';
      for(const p of d.open_positions){
        const pnl=p.pnl,pnlPct=p.pnl_pct;
        const cls=(pnl??0)>=0?'pos':'neg';
        const pnlTxt=pnl!=null?`<span class="${cls}">${pnl>=0?'+':''}$${pnl.toFixed(2)} (${pnlPct>=0?'+':''}${pnlPct.toFixed(1)}%)</span>`:'—';
        h+=`<tr><td><strong>${esc(p.ticker)}</strong></td><td>${(+p.shares).toFixed(4)}</td><td>$${(+p.entry_price).toFixed(2)}</td><td>${p.current_price!=null?'$'+p.current_price.toFixed(2):'—'}</td><td>${pnlTxt}</td><td><button class="close-pos-btn" data-pos="${p.id}" data-pid="${id}" style="background:var(--line);color:var(--red);border:1px solid var(--line);padding:3px 8px;border-radius:3px;font-size:10px;cursor:pointer;">CLOSE</button></td></tr>`;
      }
      h+='</tbody></table>';posEl.innerHTML=h;
      posEl.querySelectorAll('.close-pos-btn').forEach(b=>b.addEventListener('click',()=>closePosition(b.dataset.pos,b.dataset.pid)));
    }
    const trEl=$(`t-${id}`);
    if(!d.trades?.length){trEl.innerHTML='<div class="empty">none</div>';}
    else{
      let h='<table class="pos-table"><thead><tr><th>When</th><th>Action</th><th>Ticker</th><th>Shares</th><th>Price</th></tr></thead><tbody>';
      for(const t of d.trades.slice(0,10)){
        const cls=t.action==='buy'?'pos':'neg';
        h+=`<tr><td style="color:var(--dim);">${esc(t.created_at?.slice(0,10)||'')}</td><td class="${cls}"><strong>${esc(t.action.toUpperCase())}</strong></td><td>${esc(t.ticker)}</td><td>${(+t.shares).toFixed(4)}</td><td>$${(+t.price).toFixed(2)}</td></tr>`;
      }
      h+='</tbody></table>';trEl.innerHTML=h;
    }
  }catch(e){$(`m-${id}`).textContent=`load error: ${e.message}`;$(`m-${id}`).className='trade-msg err';}
}

async function submitTrade(form){
  const id=form.dataset.pid;
  const msg=$(`m-${id}`);
  const btn=form.querySelector('button');
  msg.textContent='';msg.className='trade-msg';btn.disabled=true;
  const fd=new FormData(form);
  const body={portfolio_id:id,ticker:fd.get('ticker'),action:fd.get('action'),shares:fd.get('shares')};
  try{
    const r=await fetch('/api/trade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    const verb=d.action==='buy'?'bought':'sold';
    const amt=d.action==='buy'?d.cost:d.proceeds;
    msg.textContent=`${verb} ${d.shares} ${d.ticker} @ $${d.price.toFixed(2)} ($${amt.toFixed(2)})`;
    msg.className='trade-msg ok';
    form.reset();
    loadDetails(id);
  }catch(e){msg.textContent=`error: ${e.message}`;msg.className='trade-msg err';}
  finally{btn.disabled=false;}
}

async function closePosition(positionId,portfolioId){
  if(!confirm('Close this position at current market price?'))return;
  try{
    const r=await fetch('/api/close_position',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({position_id:Number(positionId)})});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    const msg=$(`m-${portfolioId}`);
    msg.textContent=`closed ${d.shares} ${d.ticker} @ $${d.price.toFixed(2)} ($${d.proceeds.toFixed(2)})`;
    msg.className='trade-msg ok';
    loadDetails(portfolioId);
  }catch(e){const msg=$(`m-${portfolioId}`);msg.textContent=`close error: ${e.message}`;msg.className='trade-msg err';}
}

$('create-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const fd=new FormData(e.target);
  const body={id:fd.get('id'),name:fd.get('name'),starting_cash:Number(fd.get('starting_cash'))};
  const msg=$('create-msg');msg.textContent='';msg.className='trade-msg';
  try{
    const r=await fetch('/api/portfolio_create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    msg.textContent=`created portfolio "${d.id}" with $${d.starting_cash.toFixed(2)}`;msg.className='trade-msg ok';
    e.target.reset();
    fetchAndRender();
  }catch(e){msg.textContent=`error: ${e.message}`;msg.className='trade-msg err';}
});

fetchAndRender();
</script>
</body>
</html>
